<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fullscreen HD Platformer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #000; /* Layar belakang hitam murni untuk sisa layar kosong */
            color: #fff;
            font-family: 'Fredoka One', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        /* 1. CONTAINER LAYAR PENUH */
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain; /* Memastikan game membesar maksimal tanpa merusak aspek rasio 16:9 */
        }

        /* UI Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 10;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            color: #f1c40f;
            text-shadow: 0 6px 0 #d35400, 0 10px 10px rgba(0,0,0,0.5);
            font-size: clamp(40px, 8vw, 80px); /* Teks diperbesar */
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 2px;
        }

        h2 {
            font-size: clamp(24px, 5vw, 40px);
            margin-bottom: 15px;
            text-shadow: 0 3px 0 #000;
        }

        .btn {
            background: linear-gradient(to bottom, #3498db, #2980b9);
            color: white;
            border: none;
            border-bottom: 6px solid #1f618d;
            border-radius: 12px;
            padding: 20px 50px;
            font-family: 'Fredoka One', cursive;
            font-size: clamp(20px, 4vw, 30px);
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
            margin: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .btn:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(4px);
            border-bottom: 2px solid #1f618d;
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 30px;
            left: 30px;
            right: 30px;
            display: flex;
            justify-content: space-between;
            font-size: clamp(20px, 3vw, 32px);
            z-index: 5;
            pointer-events: none;
            text-shadow: 0 4px 0 rgba(0,0,0,0.8);
            color: white;
        }

        /* Mobile Controls */
        #mobile-controls {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            display: none;
            justify-content: space-between;
            padding: 0 50px;
            z-index: 20;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        #mobile-controls:active {
            opacity: 1;
        }

        .control-group {
            display: flex;
            gap: 30px;
        }

        .control-btn {
            width: 90px;
            height: 90px;
            background-color: rgba(255, 255, 255, 0.2);
            border: 4px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            color: white;
            pointer-events: auto;
            backdrop-filter: blur(2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .control-btn:active {
            background-color: rgba(255, 255, 255, 0.5);
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="hud">
        <div id="score-display">SCORE: 0</div>
        <div id="coin-display">COINS: 0</div>
        <div id="lives-display">LIVES: 3</div>
    </div>

    <div id="main-menu" class="overlay">
        <h1>Mighty Runner</h1>
        <div style="margin-bottom: 40px; font-size: 24px; line-height: 1.6; text-align: center; text-shadow: 0 3px 6px #000;">
            Controls:<br>Arrows / WASD to move<br>Down to Crouch / Fast Fall<br>Space / Up to jump<br>F / X to Attack
        </div>
        <button class="btn" id="start-btn">START GAME</button>
        <div style="font-size: 20px; margin-top: 30px;" id="high-score-display">HIGH SCORE: 0</div>
    </div>

    <div id="game-over" class="overlay hidden">
        <h1 style="color: #e74c3c; text-shadow: 0 6px 0 #922b21;">GAME OVER</h1>
        <button class="btn" id="restart-btn" style="background: #e74c3c; border-color: #c0392b;">TRY AGAIN</button>
    </div>

    <div id="victory" class="overlay hidden">
        <h1 style="color: #2ecc71; text-shadow: 0 6px 0 #27ae60;">LEVEL CLEARED!</h1>
        <h2 id="final-score">SCORE: 0</h2>
        <button class="btn" id="next-btn">PLAY AGAIN</button>
    </div>

    <div id="mobile-controls">
        <div class="control-group">
            <div class="control-btn" id="btn-left">◀</div>
            <div class="control-btn" id="btn-down">▼</div>
            <div class="control-btn" id="btn-right">▶</div>
        </div>
        <div class="control-group">
            <div class="control-btn" id="btn-attack" style="background-color: rgba(231, 76, 60, 0.5); border-color: #ff7979;">⚔️</div>
            <div class="control-btn" id="btn-jump">▲</div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { alpha: false }); 

    // UI Elements
    const mainMenu = document.getElementById('main-menu');
    const gameOverMenu = document.getElementById('game-over');
    const victoryMenu = document.getElementById('victory');
    const scoreDisplay = document.getElementById('score-display');
    const coinDisplay = document.getElementById('coin-display');
    const livesDisplay = document.getElementById('lives-display');
    const mobileControls = document.getElementById('mobile-controls');
    
    // 2. SKALA RESOLUSI DIPERBESAR
    const GAME_WIDTH = 2000;
    const GAME_HEIGHT = 1125;
    const TILE_SIZE = 80; // Blok/Tanah diperbesar menjadi 80px
    
    // Physics Constants - Disesuaikan dengan karakter yang lebih besar
    const GRAVITY = 1.2;
    const TERMINAL_VELOCITY = 28;
    const FRICTION = 0.8;
    const ACCELERATION = 1.8;
    const MAX_SPEED = 12;
    const JUMP_FORCE = -28; // Lompatan dibuat lebih bertenaga

    // Game State
    let gameState = 'menu';
    let animationId;
    let camera = { x: 0, y: 0 };
    let score = 0;
    let coins = 0;
    let lives = 3;
    let highScore = localStorage.getItem('giantPlatHighScore') || 0;
    
    document.getElementById('high-score-display').innerText = `HIGH SCORE: ${highScore}`;

    // Resize Handler
    function resizeCanvas() {
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;
        ctx.imageSmoothingEnabled = true; 
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Input Handling
    const keys = { left: false, right: false, up: false, down: false, attack: false };

    window.addEventListener('keydown', (e) => {
        if(gameState !== 'playing') return;
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
        if (e.code === 'ArrowDown' || e.code === 'KeyS') keys.down = true;
        if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
            if(!keys.up && player) player.jump();
            keys.up = true;
        }
        if (e.code === 'KeyF' || e.code === 'KeyX' || e.code === 'Enter') {
            if(!keys.attack && player) player.attack();
            keys.attack = true;
        }
    });

    window.addEventListener('keyup', (e) => {
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
        if (e.code === 'ArrowDown' || e.code === 'KeyS') keys.down = false;
        if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') keys.up = false;
        if (e.code === 'KeyF' || e.code === 'KeyX' || e.code === 'Enter') keys.attack = false;
    });

    // Touch Controls
    function setupTouchControls() {
        const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        if (isTouch) {
            mobileControls.style.display = 'flex';
            const btnLeft = document.getElementById('btn-left');
            const btnRight = document.getElementById('btn-right');
            const btnDown = document.getElementById('btn-down');
            const btnJump = document.getElementById('btn-jump');
            const btnAttack = document.getElementById('btn-attack');

            const addTouch = (elem, key) => {
                elem.addEventListener('touchstart', (e) => { 
                    e.preventDefault(); 
                    keys[key] = true; 
                    if(key === 'up' && player) player.jump(); 
                    if(key === 'attack' && player) player.attack();
                });
                elem.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
            };

            addTouch(btnLeft, 'left');
            addTouch(btnRight, 'right');
            addTouch(btnDown, 'down');
            addTouch(btnJump, 'up');
            addTouch(btnAttack, 'attack');
        }
    }
    setupTouchControls();

    const levelMap = [
        "                                                                                                                                                                                                        ",
        "                                                                                                                                                                                                        ",
        "                                                                                                                                                                                                      6 ",
        "                                                                                                                                                                                                      5 ",
        "                                                                                                                                                                                                      5 ",
        "                                                                                                                                                                                                      5 ",
        "                                                                                                                                                                                                      5 ",
        "                                                                                                                                                                                                      5 ",
        "                                       88                                                         888                                           88                                                    5 ",
        "           88                          88                                            88           888                                           88                                        88          5 ",
        "           88                          88                                            88           888                                           88                                        88          5 ",
        "           88           888            88        9                  8888             88           888             8888                      88888             8888                    88          5 ",
        "           88           888            88                           8888             88   9       888      9      8888          9           88888             8888        9           88          5 ",
        "111111111111111111111777111111111111111111111111111777771111111111111111111111111111111111111111111111111177711111111111111111111111111117777111111111111111111111111111111111111111111111111111111111",
        "111111111111111111111777111111111111111111111111111777771111111111111111111111111111111111111111111111111177711111111111111111111111111117777111111111111111111111111111111111111111111111111111111111"
    ];

    let mapWidth = levelMap[0].length * TILE_SIZE;
    let mapHeight = levelMap.length * TILE_SIZE;

    // AABB Collision (Akurat)
    function checkCollision(r1, r2) {
        return r1.x < r2.x + r2.w &&
               r1.x + r1.w > r2.x &&
               r1.y < r2.y + r2.h &&
               r1.y + r1.h > r2.y;
    }

    class Particle {
        constructor(x, y, color, type = 'normal') {
            this.x = x;
            this.y = y;
            this.color = color;
            this.type = type; 
            this.life = 1.0;
            
            if (type === 'normal') {
                this.vx = (Math.random() - 0.5) * 20;
                this.vy = (Math.random() - 1) * 20;
                this.size = Math.random() * 16 + 6;
            } else if (type === 'text') {
                this.vx = 0;
                this.vy = -5;
                this.text = "+100";
            }
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            if (this.type === 'normal') {
                this.vy += GRAVITY * 0.5;
            }
            this.life -= 0.02;
        }
        draw() {
            ctx.globalAlpha = Math.max(0, this.life);
            if (this.type === 'normal') {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x - camera.x, this.y - camera.y, this.size, 0, Math.PI*2);
                ctx.fill();
            } else if (this.type === 'text') {
                ctx.fillStyle = 'white';
                ctx.font = 'bold 40px "Fredoka One"';
                ctx.fillText(this.text, this.x - camera.x, this.y - camera.y);
            }
            ctx.globalAlpha = 1.0;
        }
    }
    
    let particles = [];
    function spawnParticles(x, y, color, count) {
        for(let i=0; i<count; i++) {
            particles.push(new Particle(x, y, color, 'normal'));
        }
    }

    let blocks = [];
    let coinsList = [];
    let enemies = [];

    class Block {
        constructor(x, y, type) {
            this.x = x;
            this.y = y;
            this.w = TILE_SIZE;
            this.h = TILE_SIZE;
            this.type = type;
            this.active = true;
            this.bounceY = 0;
            this.bouncing = false;
        }
        
        hit() {
            if (this.type === '1') {
                this.bouncing = true;
                setTimeout(() => { this.bouncing = false; this.bounceY = 0; }, 100);
                spawnParticles(this.x + 40, this.y + 40, '#d35400', 6);
            }
        }
        
        update() {
            if (this.bouncing) this.bounceY = -20;
            else this.bounceY = 0;
        }
        
        draw() {
            let drawX = this.x - camera.x;
            let drawY = this.y - camera.y + this.bounceY;
            
            ctx.save();
            if (this.type === '1') {
                let grad = ctx.createLinearGradient(drawX, drawY, drawX, drawY + this.h);
                grad.addColorStop(0, '#e67e22');
                grad.addColorStop(1, '#d35400');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.roundRect(drawX, drawY, this.w, this.h, 10);
                ctx.fill();
                ctx.strokeStyle = '#a04000';
                ctx.lineWidth = 5;
                ctx.stroke();
            } else if (this.type === '5') { // Flag Pole
                ctx.fillStyle = '#f1c40f';
                ctx.fillRect(drawX + this.w/2 - 10, drawY, 20, this.h);
            } else if (this.type === '6') { // Flag
                ctx.fillStyle = '#e74c3c';
                ctx.beginPath();
                ctx.moveTo(drawX + this.w/2 - 10, drawY);
                ctx.lineTo(drawX - 50, drawY + 40);
                ctx.lineTo(drawX + this.w/2 - 10, drawY + 80);
                ctx.fill();
            } else if (this.type === '7') { // Duri / Spikes Bawah
                ctx.fillStyle = '#bdc3c7';
                ctx.beginPath();
                ctx.moveTo(drawX, drawY + this.h);
                ctx.lineTo(drawX + this.w/2, drawY + this.h/2);
                ctx.lineTo(drawX + this.w, drawY + this.h);
                ctx.fill();
                ctx.strokeStyle = '#7f8c8d';
                ctx.lineWidth = 4;
                ctx.stroke();
            } else if (this.type === '8') { // Stone Pillar
                ctx.fillStyle = '#95a5a6';
                ctx.fillRect(drawX, drawY, this.w, this.h);
                ctx.strokeStyle = '#7f8c8d';
                ctx.lineWidth = 4;
                ctx.strokeRect(drawX, drawY, this.w, this.h);
                // Garis batu bata
                ctx.beginPath();
                ctx.moveTo(drawX, drawY + this.h/2);
                ctx.lineTo(drawX + this.w, drawY + this.h/2);
                ctx.moveTo(drawX + this.w/2, drawY);
                ctx.lineTo(drawX + this.w/2, drawY + this.h/2);
                ctx.stroke();
            } else if (this.type === '9') { // BOM
                let cx = drawX + this.w/2;
                let cy = drawY + this.h/2 + 10;
                let radius = this.w/2 - 10;
                
                // Sumbu (Fuse)
                ctx.strokeStyle = '#c0392b';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(cx, cy - radius);
                ctx.quadraticCurveTo(cx + 10, cy - radius - 15, cx + 20, cy - radius - 20);
                ctx.stroke();
                
                // Percikan api (Spark)
                ctx.fillStyle = '#f1c40f';
                ctx.beginPath();
                ctx.arc(cx + 20, cy - radius - 20, 6 + Math.random()*4, 0, Math.PI*2);
                ctx.fill();

                // Tubuh Bom
                ctx.fillStyle = '#111';
                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, Math.PI*2);
                ctx.fill();
                
                // Highlight bola bom
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.arc(cx - 8, cy - 8, radius/4, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.restore();
        }
    }

    class Coin {
        constructor(x, y, fromBlock = false) {
            this.x = x;
            this.y = y;
            this.w = 40; // Koin diperbesar
            this.h = 60;
            this.vy = fromBlock ? -24 : 0;
            this.fromBlock = fromBlock;
            this.collected = false;
            this.timer = 0;
        }
        update() {
            if (this.collected) return;
            this.timer++;
            
            if (this.fromBlock) {
                this.y += this.vy;
                this.vy += GRAVITY;
                if (this.vy > 0) {
                    this.collected = true; 
                    coins++;
                    spawnParticles(this.x + this.w/2, this.y + this.h/2, '#f1c40f', 10);
                }
            } else {
                this.y += Math.sin(this.timer * 0.1) * 1.0;
            }
        }
        draw() {
            if (this.collected) return;
            let drawX = this.x - camera.x;
            let drawY = this.y - camera.y;
            
            let widthScale = Math.abs(Math.cos(this.timer * 0.1));
            let currentWidth = Math.max(10, this.w * widthScale);
            let xOffset = (this.w - currentWidth) / 2;
            
            ctx.save();
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#f1c40f';
            ctx.fillStyle = '#f1c40f';
            ctx.beginPath();
            ctx.ellipse(drawX + xOffset + currentWidth/2, drawY + this.h/2, currentWidth/2, this.h/2, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#f39c12';
            ctx.lineWidth = 5;
            ctx.stroke();
            ctx.restore();
        }
    }

    // --- DAFTAR KATA NEGATIF & WARNA MUSUH ---
    const NEGATIVE_WORDS = [
        "Melawan Orang Tua", "Berbicara Kasar", "Tidak Sopan",
        "Tidak Disiplin", "Curang di Game", "Merusak Fasilitas",
        "Suka Berbohong", "Suka Membully", "Sering Membolos",
        "Malas Belajar", "Menyontek PR", "Suka Berkelahi"
    ];

    // --- TEMA WARNA TUA UNTUK BOLA & DURI ---
    const ENEMY_THEMES = [
        { base: '#1a1a1a', spikeLight: '#3d3d3d', spikeDark: '#0a0a0a' }, // Hitam
        { base: '#800000', spikeLight: '#a52a2a', spikeDark: '#4d0000' }, // Merah Tua
        { base: '#004d00', spikeLight: '#008000', spikeDark: '#003300' }, // Hijau Tua
        { base: '#4a235a', spikeLight: '#633974', spikeDark: '#311432' }, // Ungu Tua
        { base: '#000080', spikeLight: '#0000b3', spikeDark: '#00004d' }, // Biru Tua
        { base: '#b38f00', spikeLight: '#d4ac0d', spikeDark: '#806600' }  // Kuning Tua
    ];

    class Enemy {
        constructor(x, y, word = "Malas", theme) {
            this.x = x;
            this.y = y;
            this.w = 320; // Bola Raksasa diperbesar 2x lipat
            this.h = 320;
            this.vx = -2.0; // Kecepatan bergerak/menggelinding diperlambat
            this.vy = 0;
            this.dead = false;
            this.deadTimer = 0;
            this.word = word;
            this.theme = theme || ENEMY_THEMES[0];
            this.color = this.theme.base;
            this.rotation = 0;
        }
        
        update() {
            if (this.dead) {
                this.deadTimer++;
                return;
            }
            
            this.vy += GRAVITY;
            if (this.vy > TERMINAL_VELOCITY) this.vy = TERMINAL_VELOCITY;
            
            this.x += this.vx;
            // Efek Rotasi saat menggelinding diperlambat
            this.rotation += this.vx * 0.015; 

            for (let b of blocks) {
                if (b.type !== '1' && b.type !== '8') continue; // Hanya nabrak rumput dan batu
                if (checkCollision(this, b)) {
                    if (this.vx > 0) this.x = b.x - this.w;
                    else this.x = b.x + b.w;
                    this.vx *= -1;
                }
            }
            
            this.y += this.vy;
            let onGround = false;
            for (let b of blocks) {
                if (b.type !== '1' && b.type !== '8') continue;
                if (checkCollision(this, b)) {
                    if (this.vy > 0) { 
                        this.y = b.y - this.h;
                        this.vy = 0;
                        onGround = true;
                    }
                }
            }
            
            if (onGround) {
                let edgeCheckX = this.vx > 0 ? this.x + this.w : this.x;
                let isBlockBelow = blocks.some(b => 
                    (b.type === '1' || b.type === '8') &&
                    edgeCheckX >= b.x && edgeCheckX <= b.x + b.w && 
                    this.y + this.h + 2 >= b.y && this.y + this.h <= b.y + b.h
                );
                if (!isBlockBelow) this.vx *= -1; 
            }
        }
        
        die() {
            this.dead = true;
            this.h = 60; // Gencet jadi gepeng disesuaikan ukuran baru
            this.y += 260; // Turunkan Y saat gepeng agar tetap di tanah
            score += 200;
            particles.push(new Particle(this.x + this.w/2, this.y, null, 'text'));
            spawnParticles(this.x + this.w/2, this.y, this.color, 40);
        }
        
        draw() {
            if (this.deadTimer > 30) return; 
            
            let drawX = this.x - camera.x;
            let drawY = this.y - camera.y;
            
            ctx.save();
            
            // Pindah orientasi ke pusat musuh
            ctx.translate(drawX + this.w/2, drawY + this.h/2);

            if (this.dead) {
                // Jika mati, gencet skala sumbu Y nya
                ctx.scale(1, 0.3);
            }

            // 1. Gambar Tubuh Bola Berduri (Ikut berputar seperti roda)
            ctx.save();
            if (!this.dead) ctx.rotate(this.rotation);
            
            let numSpikes = 6; // Menggunakan 6 duri agar menyebar rata
            let radius = this.w / 2 - 45; // Radius bola inti
            let spikeHeight = 45; // Panjang duri
            let spikeBaseW = 55;  // Lebar bawah duri

            // Menggambar Duri (Gaya Lipatan 3D Flat, menyesuaikan warna bola)
            for (let i = 0; i < numSpikes; i++) {
                ctx.save();
                ctx.rotate((i * Math.PI * 2) / numSpikes);

                // Setengah Duri Kiri (Warna Terang)
                ctx.beginPath();
                ctx.moveTo(0, -radius - spikeHeight); // Ujung Lancip
                ctx.lineTo(-spikeBaseW/2, -radius + 5); // Kiri bawah
                ctx.lineTo(0, -radius + 5); // Tengah bawah
                ctx.fillStyle = this.theme.spikeLight;
                ctx.fill();

                // Setengah Duri Kanan (Warna Gelap/Bayangan)
                ctx.beginPath();
                ctx.moveTo(0, -radius - spikeHeight); // Ujung Lancip
                ctx.lineTo(0, -radius + 5); // Tengah bawah
                ctx.lineTo(spikeBaseW/2, -radius + 5); // Kanan bawah
                ctx.fillStyle = this.theme.spikeDark;
                ctx.fill();

                ctx.restore();
            }

            // Menggambar Bola Inti (Warna Dasar Solid)
            ctx.beginPath();
            ctx.arc(0, 0, radius, 0, Math.PI*2);
            ctx.fillStyle = this.color; 
            ctx.fill();

            // Menambahkan Efek Volume Bayangan Sabit (Crescent Shadow) di bagian bawah bola
            ctx.save();
            ctx.beginPath();
            ctx.arc(0, 0, radius, 0, Math.PI * 2);
            ctx.clip(); // Batasi gambar hanya di dalam lingkaran inti bola

            ctx.beginPath();
            ctx.arc(0, 0, radius, 0, Math.PI * 2);
            ctx.arc(-20, -25, radius, 0, Math.PI * 2, true); // Potong bagian atas kiri
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)'; // Bayangan hitam transparan
            ctx.fill('evenodd');
            ctx.restore();
            
            ctx.restore(); // Hentikan rotasi agar teks tetap tegak

            // 2. Gambar Teks Raksasa di Tengah Bola (Rapi & Tidak Gepeng)
            if (!this.dead) {
                let words = this.word.split(' ');
                let lines = [];
                
                // Logika pembagian baris yang seragam
                if (words.length === 1) lines.push(words[0]);
                else if (words.length === 2) { lines.push(words[0]); lines.push(words[1]); }
                else if (words.length === 3) { lines.push(words[0] + " " + words[1]); lines.push(words[2]); }
                else {
                    lines.push(words[0] + " " + words[1]);
                    lines.push(words.slice(2).join(" "));
                }
                
                // Font dibuat statis (selalu berukuran 48px), tidak akan gepeng menyempit
                ctx.font = `bold 48px "Fredoka One", sans-serif`; 
                ctx.fillStyle = 'white';
                ctx.strokeStyle = 'black';
                ctx.lineWidth = 10; 
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                let lineHeight = 55;
                let startY = -(lines.length - 1) * (lineHeight / 2);
                
                // Cetak setiap baris di posisi tengah yang harmonis
                for(let j = 0; j < lines.length; j++) {
                    ctx.strokeText(lines[j], 0, startY + j * lineHeight);
                    ctx.fillText(lines[j], 0, startY + j * lineHeight);
                }
            }

            ctx.restore();
        }
    }

    class Player {
        constructor() {
            // 3. UKURAN KARAKTER DIPERBESAR (Sekarang 4x dari ukuran aslinya)
            this.w = 288; // Lebar
            this.originalH = 400; // Tinggi Asli
            this.crouchH = 200; // Tinggi saat menunduk
            this.h = this.originalH; 
            this.walkCycle = 0; // Variabel penggerak animasi langkah
            this.currentWalkAngle = 0; // Menyimpan sudut animasi berjalan saat ini
            this.currentWalkBounce = 0; // Menyimpan tinggi pantulan saat ini
            
            // Menggunakan gambar URL Anda
            this.image = new Image();
            this.image.src = 'https://raw.githubusercontent.com/CikguTere/Rule-Blaster/main/magic_edit%23TUFIS1lPOEZtbTgjMSM3NmUyZTg4NmExZjBiY2VhYWYwNTIyMjI4MTNhODBlMCMxMTM4IyNUUkFOU0ZPUk1BVElPTl9SRVFVRVNU.png'; 
            
            this.reset();
        }

        reset() {
            this.x = 200;
            this.y = 100; // Muncul lebih di atas agar tidak terjebak tanah awal
            this.vx = 0;
            this.vy = 0;
            this.onGround = false;
            this.jumpCount = 0;
            this.isInvincible = false;
            this.invincibleTimer = 0;
            this.facingRight = true;
            this.attackTimer = 0;
            this.attackCooldown = 0;
            this.isCrouching = false;
            this.h = this.originalH;
            this.dropTimer = 0;
            this.ignoredBlocks = [];
            this.walkCycle = 0; // Reset siklus langkah
            this.currentWalkAngle = 0;
            this.currentWalkBounce = 0;
        }

        attack() {
            if (this.attackCooldown <= 0) {
                this.attackTimer = 15; // Berapa frame tebasan aktif
                this.attackCooldown = 30; // Jeda sebelum bisa menebas lagi
                
                // Efek partikel kecil saat mengayunkan pedang
                spawnParticles(this.facingRight ? this.x + this.w : this.x, this.y + this.h/2, '#00ffff', 5);
            }
        }

        jump() {
            if (this.jumpCount < 2) {
                this.vy = JUMP_FORCE;
                this.onGround = false;
                this.jumpCount++;
                
                // Efek partikel: Putih untuk lompatan pertama, Biru (Cyan) untuk double jump
                let particleColor = this.jumpCount === 1 ? '#ffffff' : '#00ffff';
                spawnParticles(this.x + this.w/2, this.y + this.h, particleColor, 15);
            }
        }

        die() {
            if (this.isInvincible) return;
            this.vy = -30; // Lompatan mati
            this.vx = 0;
            lives--;
            updateHUD();
            
            setTimeout(() => {
                if (lives > 0) {
                    this.reset();
                    this.isInvincible = true;
                    this.invincibleTimer = 120;
                } else {
                    gameOver();
                }
            }, 1500);
        }

        update() {
            if (lives <= 0 && this.y > GAME_HEIGHT) return; 

            if (this.isInvincible) {
                this.invincibleTimer--;
                if (this.invincibleTimer <= 0) this.isInvincible = false;
            }

            // Logika Serangan Pedang
            if (this.attackCooldown > 0) this.attackCooldown--;
            if (this.attackTimer > 0) {
                this.attackTimer--;
                
                // Hitbox pedang diperbesar menutupi jarak yang luas
                let attackReach = 280; 
                let attackBox = {
                    x: this.facingRight ? this.x + this.w : this.x - attackReach,
                    y: this.y,
                    w: attackReach,
                    h: this.h 
                };
                
                // Cek tabrakan pedang dengan musuh
                for (let e of enemies) {
                    if (!e.dead && checkCollision(attackBox, e)) {
                        e.die();
                        spawnParticles(e.x + e.w/2, e.y + e.h/2, '#00ffff', 15); // Efek tebasan kena
                    }
                }
            }

            // Gravity
            this.vy += GRAVITY;
            
            // Logika Turun Cepat (Fast Fall) jika menekan Arrow Down di udara
            if (keys.down && !this.onGround) {
                this.vy += GRAVITY * 2.5; 
            }
            
            if (this.vy > TERMINAL_VELOCITY) this.vy = TERMINAL_VELOCITY;

            // X Movement & Logika Menunduk (Crouch) atau Turun (Drop Down)
            if (keys.down && this.onGround) {
                if (this.dropTimer <= 0) {
                    // Cari pijakan saat ini
                    let standingBlocks = blocks.filter(b => 
                        (b.type === '1' || b.type === '8') && 
                        this.x + 10 < b.x + b.w && this.x + this.w - 10 > b.x && 
                        Math.abs((this.y + this.h) - b.y) <= 5
                    );
                    
                    // Pastikan di bawah pijakan ini kosong (bukan tanah solid berlapis)
                    let canDrop = standingBlocks.length > 0 && standingBlocks.every(sb => 
                        !blocks.some(b2 => (b2.type === '1' || b2.type === '8') && b2.x === sb.x && b2.y === sb.y + TILE_SIZE)
                    );

                    if (canDrop) {
                        this.dropTimer = 20; // Frame untuk menembus balok
                        this.ignoredBlocks = standingBlocks;
                        this.isCrouching = false; 
                    } else {
                        // Jika di bawahnya solid (lantai paling bawah), lakukan menunduk biasa
                        this.isCrouching = true;
                    }
                } else {
                    this.isCrouching = false;
                }
            } else {
                this.isCrouching = false;
            }

            if (this.dropTimer > 0) {
                this.dropTimer--;
                if (this.dropTimer === 0) {
                    this.ignoredBlocks = [];
                }
            }

            // Ubah hitbox dan posisi Y saat menunduk
            if (this.isCrouching && this.h === this.originalH) {
                this.h = this.crouchH;
                this.y += (this.originalH - this.crouchH);
            } else if (!this.isCrouching && this.h === this.crouchH) {
                this.h = this.originalH;
                this.y -= (this.originalH - this.crouchH);
            }

            if (keys.left && !this.isCrouching) {
                this.vx -= ACCELERATION;
                this.facingRight = false;
            } else if (keys.right && !this.isCrouching) {
                this.vx += ACCELERATION;
                this.facingRight = true;
            } else {
                this.vx *= FRICTION; 
            }

            if (this.vx > MAX_SPEED) this.vx = MAX_SPEED;
            if (this.vx < -MAX_SPEED) this.vx = -MAX_SPEED;
            if (Math.abs(this.vx) < 0.1) this.vx = 0;

            // X Collision
            this.x += this.vx;
            if (this.x < 0) this.x = 0;
            
            for (let b of blocks) {
                if ((b.type === '5' || b.type === '6') && checkCollision(this, b)) {
                    levelComplete();
                    return;
                }
                if ((b.type === '7' || b.type === '9') && checkCollision(this, b)) {
                    this.die(); // Mati jika terkena jebakan duri atau BOM
                }
                if (this.ignoredBlocks.includes(b)) continue; // Tembus balok saat Drop Down
                if ((b.type === '1' || b.type === '8') && checkCollision(this, b)) {
                    if (this.vx > 0) { 
                        this.x = b.x - this.w;
                        this.vx = 0;
                    } else if (this.vx < 0) { 
                        this.x = b.x + b.w;
                        this.vx = 0;
                    }
                }
            }

            // Y Collision
            this.y += this.vy;
            this.onGround = false;

            for (let b of blocks) {
                if ((b.type === '7' || b.type === '9') && checkCollision(this, b)) {
                    this.die(); // Mati jika menginjak jebakan duri atau BOM
                }
                if (this.ignoredBlocks.includes(b)) continue; // Tembus balok saat Drop Down
                if ((b.type === '1' || b.type === '8') && checkCollision(this, b)) {
                    if (this.vy > 0) { 
                        this.y = b.y - this.h;
                        this.vy = 0;
                        this.onGround = true;
                        this.jumpCount = 0; // Reset double jump saat menyentuh tanah
                    } else if (this.vy < 0) { 
                        this.y = b.y + b.h;
                        this.vy = 0;
                        b.hit(); 
                    }
                }
            }

            // Interactions
            for (let e of enemies) {
                if (!e.dead && checkCollision(this, e)) {
                    if (this.vy > 0 && this.y + this.h < e.y + e.h / 2) {
                        // Karakter hanya memantul seperti trampolin, BOLA TIDAK HANCUR saat diinjak
                        this.vy = JUMP_FORCE * 0.7; 
                        this.jumpCount = 0; // Reset double jump saat menginjak musuh
                    } else {
                        // Tidak ada pengurangan nyawa (Hanya menyentuh bola aman)
                    }
                }
            }

            for (let c of coinsList) {
                if (!c.collected && checkCollision(this, c)) {
                    c.collected = true;
                    coins++;
                    score += 50;
                    spawnParticles(c.x + 4, c.y + 6, '#fbf236', 15);
                    updateHUD();
                }
            }

            // Pit death
            if (this.y > GAME_HEIGHT) {
                this.die();
            }
        }

        draw() {
            if (this.isInvincible && Math.floor(this.invincibleTimer / 5) % 2 === 0) return;

            let drawX = this.x - camera.x;
            let drawY = this.y - camera.y;

            ctx.save();
            
            // 0. LOGIKA ANIMASI MELANGKAH YANG DIPERHALUS (Smooth Procedural Animation)
            let targetWalkAngle = 0;
            let targetWalkBounce = 0;
            
            // Jika sedang di tanah, berlari, dan tidak sedang merunduk
            if (this.onGround && Math.abs(this.vx) > 0.5 && !this.isCrouching) {
                // Kecepatan putaran siklus menyesuaikan kecepatan lari
                this.walkCycle += Math.abs(this.vx) * 0.012; 
                targetWalkAngle = Math.sin(this.walkCycle) * 0.12; // Ayunan tubuh lebih natural
                // Menggunakan kurva 1-cos untuk pantulan membulat yang sangat mulus (tidak tajam)
                targetWalkBounce = (1 - Math.cos(this.walkCycle * 2)) * 8; 
            } else if (!this.onGround && !this.isCrouching) {
                // Postur dinamis saat melompat / jatuh di udara (dipertahankan lembut)
                targetWalkAngle = this.vy > 0 ? 0.08 : -0.08; 
                targetWalkBounce = 0;
            } else {
                // Diam
                targetWalkAngle = 0;
                targetWalkBounce = 0;
            }

            // LERP (Linear Interpolation) - Rahasia untuk transisi tanpa patah-patah!
            this.currentWalkAngle += (targetWalkAngle - this.currentWalkAngle) * 0.15;
            this.currentWalkBounce += (targetWalkBounce - this.currentWalkBounce) * 0.2;

            // Pindah pusat poros koordinat tepat ke "Titik Kaki Tengah" (Bottom Center)
            ctx.translate(drawX + this.w / 2, drawY + this.h - this.currentWalkBounce);

            // Balikkan SELURUH objek (Karakter + Pedang) secara otomatis jika menghadap kiri
            if (!this.facingRight) {
                ctx.scale(-1, 1);
            }

            // Aplikasikan kemiringan berjalan yang sudah di-smoothing
            ctx.rotate(this.currentWalkAngle);

            ctx.shadowColor = 'rgba(0,0,0,0.4)';
            ctx.shadowBlur = 12;
            ctx.shadowOffsetY = 10;

            // 1. MENGGAMBAR KARAKTER TERLEBIH DAHULU (Agar ada di belakang pedang)
            if (this.image.complete && this.image.naturalHeight !== 0) {
                ctx.save();
                ctx.beginPath();
                // Potong radius (Masking) dengan acuan dari kaki ke atas kepalanya (-this.w/2, -this.h)
                ctx.roundRect(-this.w / 2, -this.h, this.w, this.h, 48); 
                ctx.clip(); 
                
                // FLIP GAMBAR: Gambar dari URL aslinya menghadap kiri. 
                // Kita wajib "Mirror" (-1) agar default-nya menghadap kanan mengikuti sistem game.
                ctx.scale(-1, 1);
                ctx.drawImage(this.image, -this.w / 2, -this.h, this.w, this.h);
                ctx.restore();
            }

            // 2. MENGGAMBAR ANIMASI PEDANG DI ATAS/DEPAN KARAKTER 
            if (this.attackTimer > 0) {
                let p = 1 - (this.attackTimer / 15); // Progress 0 ke 1
                
                // --- MENGGAMBAR PEDANG FISIK ---
                ctx.save();
                // Posisikan engsel putaran pada lengan bahu (Relatif terhadap titik kaki tengah)
                ctx.translate(50, -this.h / 2 + 50); 
                
                // Ayunkan pedang dari posisi atas-belakang ke depan-bawah
                let startAngleSword = -Math.PI * 0.6; 
                let endAngleSword = Math.PI * 0.3;    
                ctx.rotate(startAngleSword + (endAngleSword - startAngleSword) * p);
                
                // Skala pedang diperbesar 1.8x menyesuaikan ukuran karakter
                ctx.scale(1.8, 1.8);

                // Matikan bayangan sejenak untuk menggambar pedang agar lebih solid
                ctx.shadowBlur = 0; 

                // Gambar Gagang Pedang (Coklat)
                ctx.fillStyle = '#5c4033';
                ctx.fillRect(-30, -8, 40, 16);
                
                // Gambar Bilah Pedang (Perak/Abu-abu)
                ctx.fillStyle = '#bdc3c7';
                ctx.beginPath();
                ctx.moveTo(17, -15);
                ctx.lineTo(130, -10);
                ctx.lineTo(160, 0); // Ujung Lancip Pedang
                ctx.lineTo(130, 10);
                ctx.lineTo(17, 15);
                ctx.fill();
                
                // Gambar Garis Kilauan di Tengah Pedang (Putih)
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(17, -2, 110, 4);
                
                ctx.restore();
                // --- AKHIR TAMBAHAN PEDANG FISIK ---

                // EFEK TEBASAN CAHAYA BIRU 
                ctx.save();
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.shadowColor = '#00ffff';
                ctx.shadowBlur = 25;
                
                // Pindah poros putaran tebasan ke titik perut (0, -h/2)
                ctx.translate(0, -this.h / 2);
                
                // Radius tebasan sinar biru membesar seukuran raksasa
                let radiusOut = 240 + (p * 120); 
                let radiusIn = radiusOut - 60; 
                
                ctx.beginPath();
                let effectStartAngle = -Math.PI / 2; 
                let sweep = Math.PI * 1.3 * p; 
                
                ctx.arc(0, 0, radiusOut, effectStartAngle, effectStartAngle + sweep, false);
                ctx.arc(0, 0, radiusIn, effectStartAngle + sweep, effectStartAngle, true);
                ctx.fill();
                
                ctx.restore();
            }

            ctx.restore(); // Kembalikan seluruh transformasi canvas ke semula
        }
    }

    let player = new Player();

    function loadLevel() {
        blocks = [];
        coinsList = [];
        enemies = [];
        let possibleSpawns = [];
        
        for (let row = 0; row < levelMap.length; row++) {
            for (let col = 0; col < levelMap[row].length; col++) {
                let char = levelMap[row][col];
                let x = col * TILE_SIZE;
                let y = row * TILE_SIZE;
                
                if (char !== ' ') {
                    blocks.push(new Block(x, y, char));
                }
                
                // Kumpulkan semua titik di mana musuh BISA muncul
                // Syarat: Blok lantai ('1') yang atasnya kosong dan cukup jauh dari titik start pemain
                if (char === '1' && row > 0 && levelMap[row-1][col] === ' ' && col > 15) {
                    possibleSpawns.push({x: x, y: y});
                }
                
                // Spawn koin acak
                if (char === ' ' && row > 5 && Math.random() < 0.05 && levelMap[row+1] && levelMap[row+1][col] === '1') {
                     coinsList.push(new Coin(x + 20, y)); 
                }
            }
        }
        
        // --- LOGIKA MUNCULKAN TEPAT 10 MUSUH (DENGAN JARAK AMAN) ---
        // 1. Acak urutan titik yang memungkinkan
        possibleSpawns.sort(() => Math.random() - 0.5);
        
        let selectedSpawns = [];
        let minDistance = TILE_SIZE * 12; // Minimal jarak antar musuh diperjauh menjadi 12 blok
        
        // 2. Filter agar tidak ada musuh yang spawn berdekatan
        for (let spawn of possibleSpawns) {
            let tooClose = false;
            for (let sel of selectedSpawns) {
                // Cek jarak Horizontal X
                if (Math.abs(spawn.x - sel.x) < minDistance) {
                    tooClose = true;
                    break;
                }
            }
            if (!tooClose) {
                selectedSpawns.push(spawn);
            }
            // Berhenti jika sudah mengumpulkan 10 lokasi aman
            if (selectedSpawns.length >= 10) break; 
        }
        
        // 3. Masukkan musuh ke map (Dengan Kata Dijamin Unik!)
        // Acak daftar kata negatif agar tidak ada yang sama di satu level
        let shuffledWords = [...NEGATIVE_WORDS].sort(() => Math.random() - 0.5);
        
        for (let i = 0; i < selectedSpawns.length; i++) {
            let spawn = selectedSpawns[i];
            let word = shuffledWords[i]; // Jaminan setiap musuh mendapatkan kata unik
            let theme = ENEMY_THEMES[i % ENEMY_THEMES.length];
            
            // Perhatikan tinggi (h = 320) agar musuh muncul pas di atas tanah
            enemies.push(new Enemy(spawn.x, spawn.y - 320, word, theme));
        }
    }

    function updateCamera() {
        let targetX = player.x - GAME_WIDTH / 3; 
        targetX = Math.max(0, Math.min(targetX, mapWidth - GAME_WIDTH));
        camera.x += (targetX - camera.x) * 0.1; 
        camera.y = 0; 
    }

    function drawBackground() {
        // Smooth gradient sky
        let bgGrad = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
        bgGrad.addColorStop(0, '#3498db');
        bgGrad.addColorStop(1, '#85c1e9');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

        // Vector Clouds
        ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
        for(let i=0; i<8; i++) {
            let cx = ((i * 400) - (camera.x * 0.15)) % (GAME_WIDTH + 300);
            if (cx < -300) cx += GAME_WIDTH + 300;
            
            ctx.beginPath();
            ctx.arc(cx, 200 + (i%3)*50, 60, 0, Math.PI*2);
            ctx.arc(cx + 60, 200 + (i%3)*50 - 30, 75, 0, Math.PI*2);
            ctx.arc(cx + 120, 200 + (i%3)*50, 60, 0, Math.PI*2);
            ctx.fill();
        }

        // Vector Hills
        ctx.fillStyle = '#27ae60';
        for(let i=0; i<12; i++) {
            let hx = ((i * 300) - (camera.x * 0.4)) % (GAME_WIDTH + 400);
            if (hx < -400) hx += GAME_WIDTH + 400;
             
            ctx.beginPath();
            let radius = 250 + (i%2)*80;
            ctx.arc(hx, GAME_HEIGHT + 50, radius, Math.PI, 0);
            ctx.fill();
        }
    }

    function updateHUD() {
        scoreDisplay.innerText = `SCORE: ${score}`;
        coinDisplay.innerText = `COINS: ${coins}`;
        livesDisplay.innerText = `LIVES: ${lives}`;
    }

    function resetGame() {
        score = 0;
        coins = 0;
        lives = 3;
        player.reset();
        loadLevel();
        updateHUD();
        camera.x = 0;
    }

    function gameLoop() {
        if (gameState !== 'playing') return;

        player.update();
        updateCamera();
        
        blocks.forEach(b => b.update());
        coinsList.forEach(c => c.update());
        
        enemies = enemies.filter(e => e.deadTimer < 30);
        enemies.forEach(e => e.update());
        
        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => p.update());

        ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
        drawBackground();
        
        blocks.forEach(b => {
            if (b.x > camera.x - TILE_SIZE*2 && b.x < camera.x + GAME_WIDTH) b.draw();
        });
        coinsList.forEach(c => {
             if (c.x > camera.x - TILE_SIZE*2 && c.x < camera.x + GAME_WIDTH) c.draw();
        });
        enemies.forEach(e => {
             if (e.x > camera.x - TILE_SIZE*2 && e.x < camera.x + GAME_WIDTH) e.draw();
        });
        
        particles.forEach(p => p.draw());
        player.draw();

        animationId = requestAnimationFrame(gameLoop);
    }

    function startGame() {
        mainMenu.classList.add('hidden');
        gameOverMenu.classList.add('hidden');
        victoryMenu.classList.add('hidden');
        gameState = 'playing';
        resetGame();
        gameLoop();
    }

    function gameOver() {
        gameState = 'gameover';
        cancelAnimationFrame(animationId);
        gameOverMenu.classList.remove('hidden');
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('giantPlatHighScore', highScore);
            document.getElementById('high-score-display').innerText = `NEW HIGH SCORE: ${highScore}`;
        }
    }

    function levelComplete() {
        gameState = 'victory';
        cancelAnimationFrame(animationId);
        victoryMenu.classList.remove('hidden');
        
        score += lives * 1000;
        score += coins * 10;
        document.getElementById('final-score').innerText = `SCORE: ${score}`;
        
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('giantPlatHighScore', highScore);
        }
    }

    // Button Event Listeners
    document.getElementById('start-btn').addEventListener('click', startGame);
    document.getElementById('restart-btn').addEventListener('click', startGame);
    document.getElementById('next-btn').addEventListener('click', startGame); 

    loadLevel();
    drawBackground();
    player.draw();

</script>
